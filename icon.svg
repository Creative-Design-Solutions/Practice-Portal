<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3ab5ac"/>
      <stop offset="100%" stop-color="#1f7971"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Squircle background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <rect width="512" height="512" rx="115" fill="url(#glow)"/>
  <!-- Monogram -->
  <text x="256" y="310"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="192"
    font-style="italic"
    font-weight="400"
    fill="#ffffff"
    opacity="0.95"
    letter-spacing="-6">PP</text>
  <!-- Subtle bottom trim -->
  <rect x="0" y="480" width="512" height="32" rx="0" fill="rgba(0,0,0,0.08)"/>
  <rect width="512" height="512" rx="115" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
</svg>
